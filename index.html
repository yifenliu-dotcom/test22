<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自訂音樂播放器</title>
    <!-- 引入 Tailwind CSS 用於快速排版與設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 用於播放器圖示 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 自訂進度條 (Range Slider) 的樣式 */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #4b5563; /* Tailwind gray-600 */
            border-radius: 9999px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #3b82f6; /* Tailwind blue-500 */
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        /* 音量條特別調整顏色 */
        #volumeBar::-webkit-slider-thumb {
            background: #f3f4f6; /* Tailwind gray-100 */
            box-shadow: none;
        }
        #volumeBar::-webkit-slider-runnable-track {
            height: 4px;
        }
        #volumeBar::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            margin-top: -4px;
        }

        /* 旋轉動畫效果（用於播放音樂時的黑膠唱片） */
        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning {
            animation: rotate-vinyl 12s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center font-sans p-4 selection:bg-blue-500 selection:text-white">

    <!-- 隱藏的音訊播放元件 -->
    <audio id="mediaPlayer" src="https://raw.githubusercontent.com/yifenliu-dotcom/test2/main/11.mp4"></audio>

    <!-- 播放器卡片容器 -->
    <div class="bg-gray-800 rounded-3xl shadow-2xl p-6 w-full max-w-md border border-gray-700">
        
        <!-- 音樂封面/黑膠唱片視覺區域 -->
        <div class="relative w-full aspect-square bg-gray-900 rounded-2xl flex items-center justify-center mb-6 shadow-inner border border-gray-750 overflow-hidden">
            <!-- 唱片背景光暈 -->
            <div class="absolute inset-0 bg-gradient-to-tr from-blue-900/20 to-purple-950/20"></div>
            
            <!-- 模擬黑膠唱片 -->
            <div id="vinylDisc" class="relative w-56 h-56 rounded-full bg-black border-4 border-gray-800 flex items-center justify-center shadow-2xl transition-all duration-500">
                <!-- 黑膠唱片軌跡紋路 -->
                <div class="absolute inset-2 rounded-full border border-gray-900/40"></div>
                <div class="absolute inset-6 rounded-full border border-gray-900/40"></div>
                <div class="absolute inset-10 rounded-full border border-gray-900/40"></div>
                <div class="absolute inset-14 rounded-full border border-gray-900/40"></div>
                
                <!-- 唱片中央標籤 -->
                <div class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center border-4 border-gray-950 z-10">
                    <i class="ph-fill ph-music-notes text-white text-3xl"></i>
                </div>
                
                <!-- 唱片中心軸孔 -->
                <div class="absolute w-3 h-3 rounded-full bg-gray-900 z-20"></div>
            </div>

            <!-- 裝飾用唱臂（唱針） -->
            <div id="toneArm" class="absolute top-4 right-12 w-24 h-24 origin-top-right transition-transform duration-500 rotate-[-25deg] pointer-events-none z-30">
                <svg viewBox="0 0 100 100" class="w-full h-full">
                    <!-- 唱臂主體 -->
                    <path d="M 90,10 Q 70,20 40,60" fill="none" stroke="#d1d5db" stroke-width="3" stroke-linecap="round"/>
                    <!-- 唱頭 -->
                    <rect x="32" y="55" width="12" height="18" rx="2" transform="rotate(-30 38 64)" fill="#4b5563" />
                    <!-- 唱臂底座 -->
                    <circle cx="90" cy="10" r="8" fill="#9ca3af" />
                </svg>
            </div>
        </div>

        <!-- 媒體資訊 -->
        <div class="text-center mb-6">
            <h2 class="text-white text-xl font-bold truncate">11.mp4</h2>
            <p class="text-gray-400 text-sm mt-1">自訂網頁音樂播放</p>
        </div>

        <!-- 進度條與時間顯示 -->
        <div class="mb-6">
            <div class="flex items-center gap-3">
                <span id="currentTime" class="text-xs text-gray-400 font-mono w-10 text-right">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" step="0.1" class="flex-grow">
                <span id="duration" class="text-xs text-gray-400 font-mono w-10">0:00</span>
            </div>
        </div>

        <!-- 主要控制按鈕 -->
        <div class="flex justify-center items-center gap-6 mb-6">
            <!-- 倒退 10 秒 -->
            <button id="rewindBtn" class="text-gray-400 hover:text-white transition-colors p-2" title="倒退 10 秒">
                <i class="ph ph-rewind-circle text-4xl"></i>
            </button>
            
            <!-- 播放/暫停 按鈕 -->
            <button id="playPauseBtn" class="bg-blue-600 text-white rounded-full p-4 hover:bg-blue-500 hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-600/40">
                <i id="playIcon" class="ph-fill ph-play text-3xl"></i>
            </button>
            
            <!-- 快轉 10 秒 -->
            <button id="forwardBtn" class="text-gray-400 hover:text-white transition-colors p-2" title="快轉 10 秒">
                <i class="ph ph-fast-forward-circle text-4xl"></i>
            </button>
        </div>

        <!-- 音量控制區域 -->
        <div class="flex items-center justify-center gap-3 bg-gray-900/50 rounded-full py-2 px-4 w-max mx-auto">
            <button id="muteBtn" class="text-gray-400 hover:text-white transition-colors" title="靜音/取消靜音">
                <i id="volumeIcon" class="ph ph-speaker-high text-xl"></i>
            </button>
            <input type="range" id="volumeBar" value="1" min="0" max="1" step="0.05" class="w-24">
        </div>

    </div>

    <script>
        // DOM 元素選取
        const player = document.getElementById('mediaPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const volumeBar = document.getElementById('volumeBar');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        
        // 音樂播放視覺效果相關元素
        const vinylDisc = document.getElementById('vinylDisc');
        const toneArm = document.getElementById('toneArm');

        // 格式化時間 (秒數轉為 分:秒)
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            const paddedSeconds = remainingSeconds < 10 ? '0' + remainingSeconds : remainingSeconds;
            return `${minutes}:${paddedSeconds}`;
        }

        // 1. 初始化：當媒體資料載入完畢後，設定總時間長度
        player.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(player.duration);
            progressBar.max = player.duration;
        });

        // 2. 播放 / 暫停 切換邏輯與動畫控制
        function togglePlay() {
            if (player.paused) {
                player.play();
                playIcon.classList.remove('ph-play');
                playIcon.classList.add('ph-pause');
                
                // 開啟黑膠唱片旋轉動畫，並移入唱針
                vinylDisc.classList.add('spinning');
                toneArm.style.transform = 'rotate(0deg)';
            } else {
                player.pause();
                playIcon.classList.remove('ph-pause');
                playIcon.classList.add('ph-play');
                
                // 暫停黑膠唱片旋轉，並移開唱針
                vinylDisc.classList.remove('spinning');
                toneArm.style.transform = 'rotate(-25deg)';
            }
        }
        playPauseBtn.addEventListener('click', togglePlay);

        // 點擊黑膠唱片區域也能暫停/播放
        vinylDisc.addEventListener('click', togglePlay);

        // 3. 更新進度條與當前時間
        player.addEventListener('timeupdate', () => {
            currentTimeEl.textContent = formatTime(player.currentTime);
            progressBar.value = player.currentTime;
        });

        // 4. 拖曳進度條跳轉時間
        progressBar.addEventListener('input', () => {
            player.currentTime = progressBar.value;
        });

        // 5. 快轉與倒退功能 (10秒)
        rewindBtn.addEventListener('click', () => {
            player.currentTime = Math.max(0, player.currentTime - 10);
        });

        forwardBtn.addEventListener('click', () => {
            player.currentTime = Math.min(player.duration, player.currentTime + 10);
        });

        // 6. 音量控制
        volumeBar.addEventListener('input', () => {
            player.volume = volumeBar.value;
            player.muted = false; // 調整音量時自動取消靜音
            updateVolumeIcon();
        });

        // 7. 靜音切換
        let previousVolume = 1;
        muteBtn.addEventListener('click', () => {
            if (player.muted) {
                player.muted = false;
                volumeBar.value = previousVolume > 0 ? previousVolume : 0.5;
                player.volume = volumeBar.value;
            } else {
                previousVolume = player.volume;
                player.muted = true;
                volumeBar.value = 0;
            }
            updateVolumeIcon();
        });

        // 根據音量大小更新音量圖示
        function updateVolumeIcon() {
            volumeIcon.className = ''; // 清除所有 class
            if (player.muted || player.volume === 0) {
                volumeIcon.classList.add('ph', 'ph-speaker-x', 'text-xl');
            } else if (player.volume < 0.5) {
                volumeIcon.classList.add('ph', 'ph-speaker-low', 'text-xl');
            } else {
                volumeIcon.classList.add('ph', 'ph-speaker-high', 'text-xl');
            }
        }

        // 處理播放完畢的狀態
        player.addEventListener('ended', () => {
            playIcon.classList.remove('ph-pause');
            playIcon.classList.add('ph-play');
            player.currentTime = 0;
            vinylDisc.classList.remove('spinning');
            toneArm.style.transform = 'rotate(-25deg)';
        });

    </script>
</body>
</html>
